services:
  backend:
    image: ghcr.io/riggleprime/dragonhack2026-backend:sha-1a89cd9
    env_file:
      - backend/.env
    environment:
      - TERRAIN_MAP_PATH=/data/eudem_slop_3035_europe.tif
    volumes:
      - ./backend/eud_cp_slop:/data:ro

  frontend:
    image: ghcr.io/riggleprime/dragonhack2026-frontend:sha-1a89cd9
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
